<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator by Michiru</title>
</head>
<body>
    <div>
        <div class="displayV"></div>
    </div>
    <div class="calcBody">
        <div class="numbers">
            <button class="no1">1</button>
            <button class="no2">2</button>
            <button class="no3">3</button>
            <button class="no4">4</button>
            <button class="no5">5</button>
            <button class="no6">6</button>
            <button class="no7">7</button>
            <button class="no8">8</button>
            <button class="no9">9</button>
            <button class="no0">0</button>
        </div>
        <div class="storedNumss">
            <button class="plus">+</button>
            <button class="minus">-</button>
            <button class="times">*</button>
            <button class="divide">/</button>
            <button class="equalsTo">=</button>
            <button class="clr">Clear</button>
        </div>
        <div class="test"></div>
    </div>
    <script>
        // Problem: When going through the logic, I joined an empty storedNum array to operateValue which
        // still would add an empty space as an item
        // Therefore, go through the logic again USING "=" in the first calculation and then use "+"
        // and then see where I joined empty array
        // Can't use "=" twice!!

        let storedNums = []
        let operateValue = []
        let disp = document.querySelector(".displayV")
        let changeDisplay = document.querySelector(".display")
        let clearButton = document.querySelector(".clr")
        clearButton.addEventListener("click", () => {
            disp.textContent = ""
            storedNums.splice(0,storedNums.length)
            operateValue.splice(0,operateValue.length)
        })

        // storedNums functions
        function operate(a, operatR, b) {
            if (b === 0) {
                return disp.textContent = "ERROR"
            } else {
                if (operatR === "+") {
                    let maths = add(a, b)
                    disp.textContent = maths
                    operateValue.splice(0,operateValue.length)
                    operateValue.push(maths)

                } else if (operatR === "-") {
                    let maths = subtract(a, b)
                    disp.textContent = maths
                    operateValue.splice(0,operateValue.length)
                    operateValue.push(maths)

                } else if (operatR === "*") {
                    let maths = multiply(a, b)
                    disp.textContent = maths
                    operateValue.splice(0,operateValue.length)
                    operateValue.push(maths)

                } else if (operatR === "/") {
                    let maths = divide(a, b)
                    disp.textContent = maths
                    operateValue.splice(0,operateValue.length)
                    operateValue.push(maths)

                } else {
                    console.log("ERROR!")
                }
            }
        }

        function joined(array) {
            if (typeof array[0] === "number") {
                let mkString = array.join("")
                operateValue.push(mkString)
            }
            let clear = array.splice(0,array.length)
        }

        function startCalc() {
            joined(storedNums)
            let n = parseInt(operateValue[2])
            if (Number.isNaN(n)) {
                return disp.textContent = "Syntax ERROR"
            }
            operate(parseInt(operateValue[0]), operateValue[1], parseInt(operateValue[2]))
        }
        
        function add(a, b) {
            return a + b
        }

        function subtract(a, b) {
            return a - b
        }

        function multiply(a, b) {
            return a * b
        }

        function divide(a, b) {
            return a / b
        }

        // Operator buttons
        let equalsToButton = document.querySelector(".equalsTo")
        equalsToButton.addEventListener("click", startCalc)

        
        let plusButton = document.querySelector(".plus")
        plusButton.addEventListener("click", () => {
            joined(storedNums)
            if (operateValue.length === 3) {
                startCalc()
            }
            operateValue.push("+")
            disp.textContent += "+"
        })
        let minusButton = document.querySelector(".minus")
        minusButton.addEventListener("click", () => {
            joined(storedNums)
            if (operateValue.length === 3) {
                startCalc()
            }
            operateValue.push("-")
            disp.textContent += "-"
        })
        let timesButton = document.querySelector(".times")
        timesButton.addEventListener("click", () => {
            joined(storedNums)
            if (operateValue.length === 3) {
                startCalc()
            }
            operateValue.push("*")
            disp.textContent += "*"
        })
        let divideButton = document.querySelector(".divide")
        divideButton.addEventListener("click", () => {
            joined(storedNums)
            if (operateValue.length === 3) {
                startCalc()
            }
            operateValue.push("/")
            disp.textContent += "/"
        })
        
        // Number buttons
        let display1 = document.querySelector(".no1")
        display1.addEventListener("click", () => {
            storedNums.push(1)
            disp.textContent += 1
        })
        let display2 = document.querySelector(".no2")
        display2.addEventListener("click", () => {
            storedNums.push(2)
            disp.textContent += 2
        })
        let display3 = document.querySelector(".no3")
        display3.addEventListener("click", () => {
            storedNums.push(3)
            disp.textContent += 3
        })
        let display4 = document.querySelector(".no4")
        display4.addEventListener("click", () => {
            storedNums.push(4)
            disp.textContent += 4
        })
        let display5 = document.querySelector(".no5")
        display5.addEventListener("click", () => {
            storedNums.push(5)
            disp.textContent += 5
        })
        let display6 = document.querySelector(".no6")
        display6.addEventListener("click", () => {
            storedNums.push(6)
            disp.textContent += 6
        })
        let display7 = document.querySelector(".no7")
        display7.addEventListener("click", () => {
            storedNums.push(7)
            disp.textContent += 7
        })
        let display8 = document.querySelector(".no8")
        display8.addEventListener("click", () => {
            storedNums.push(8)
            disp.textContent += 8
        })
        let display9 = document.querySelector(".no9")
        display9.addEventListener("click", () => {
            storedNums.push(9)
            disp.textContent += 9
        })
        let display0 = document.querySelector(".no0")
        display0.addEventListener("click", () => {
            storedNums.push(0)
            disp.textContent += 0
        })
    </script>
</body>
</html>
