<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator by Michiru</title>
</head>
<body>
    <div>
        <div class="displayV"></div>
    </div>
    <div class="calcBody">
        <div class="numbers">
            <button class="no1">1</button>
            <button class="no2">2</button>
            <button class="no3">3</button>
            <button class="no4">4</button>
            <button class="no5">5</button>
            <button class="no6">6</button>
            <button class="no7">7</button>
            <button class="no8">8</button>
            <button class="no9">9</button>
            <button class="no0">0</button>
        </div>
        <div class="operators">
            <button class="plus">+</button>
            <button class="minus">-</button>
            <button class="times">*</button>
            <button class="divide">/</button>
            <button class="equalsTo">=</button>
            <button>Clear</button>
        </div>
        <div class="test"></div>
    </div>
    <script>
        let displayValue = 0
        let displayOperator = 0
        let disp = document.querySelector(".displayV")
        let changeDisplay = document.querySelector(".display")

        // Operator functions
        function add(a, b) {
            return a + b
        }

        function subtract(a, b) {
            return a - b
        }

        function multiply(a, b) {
            return a * b
        }

        function divide(a, b) {
            return a / b
        }

        function operate(a, operator, b) {
            if (operator === "+") {
                return add(a, b)
            } else if (operator === "-") {
                return subtract(a, b)
            } else if (operator === "*") {
                return multiply(a, b) 
            } else if (operator === "/") {
                return divide(a, b)
            }
        }

        // Operator buttons
        let plusButton = document.querySelector(".plus")
        plusButton.addEventListener("click", () => {
            displayOperator += "+"
            disp.textContent += "+"
        })
        let minusButton = document.querySelector(".minus")
        minusButton.addEventListener("click", () => {
            displayOperator += "-"
            disp.textContent += "-"
        })
        let timesButton = document.querySelector(".times")
        timesButton.addEventListener("click", () => {
            displayOperator += "*"
            disp.textContent += "*"
        })
        let divideButton = document.querySelector(".divide")
        divideButton.addEventListener("click", () => {
            displayOperator += "/"
            disp.textContent += "/"
        })
        let equalsToButton = document.querySelector(".equalsTo")
        equalsToButton.addEventListener("click", () => {
            
        })
        
        

        // Number buttons
        let display1 = document.querySelector(".no1")
        display1.addEventListener("click", () => {
            displayValue += 1
            disp.textContent += 1
        })
        let display2 = document.querySelector(".no2")
        display2.addEventListener("click", () => {
            displayValue += 2
            disp.textContent += 2
        })
        let display3 = document.querySelector(".no3")
        display3.addEventListener("click", () => {
            displayValue += 3
            disp.textContent += 3
        })
        let display4 = document.querySelector(".no4")
        display4.addEventListener("click", () => {
            displayValue += 4
            disp.textContent += 4
        })
        let display5 = document.querySelector(".no5")
        display5.addEventListener("click", () => {
            displayValue += 5
            disp.textContent += 5
        })
        let display6 = document.querySelector(".no6")
        display6.addEventListener("click", () => {
            displayValue += 6
            disp.textContent += 6
        })
        let display7 = document.querySelector(".no7")
        display7.addEventListener("click", () => {
            displayValue += 7
            disp.textContent += 7
        })
        let display8 = document.querySelector(".no8")
        display8.addEventListener("click", () => {
            displayValue += 8
            disp.textContent += 8
        })
        let display9 = document.querySelector(".no9")
        display9.addEventListener("click", () => {
            displayValue += 9
            disp.textContent += 9
        })
        let display0 = document.querySelector(".no0")
        display0.addEventListener("click", () => {
            displayValue += 0
            disp.textContent += 0
        })
    </script>
</body>
</html>
